services:
  - type: web
    name: klerp-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: FRONTEND_URL
        value: https://klerp-frontend.vercel.app/   # <-- update after deploying frontend
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
